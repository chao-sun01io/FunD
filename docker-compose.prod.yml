services:
  web:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - static_files:/usr/src/app/staticfiles
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 300m

  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file: ./backend/.env
    expose:
      - "5432"
    restart: unless-stopped
    mem_limit: 256m
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "effective_cache_size=128MB"
      - "-c"
      - "max_connections=20"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    expose:
      - "6379"
    restart: unless-stopped
    mem_limit: 96m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    env_file: ./backend/.env
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - static_files:/usr/src/app/staticfiles:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: unless-stopped
    mem_limit: 64m

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    mem_limit: 96m

volumes:
  postgres_data:
  static_files:
  certbot_www:
  certbot_conf:
